<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container">
    <a class="navbar-brand" href="#">E-Commerce UNT</a>
    <div class="d-flex" *ngIf="isLoggedIn">
      <span class="navbar-text me-3 text-white">Hola, {{ email }}</span>
      <button class="btn btn-outline-light btn-sm" (click)='logout()'>Cerrar Sesión</button>
    </div>
  </div>
</nav>

<div class="container">
  <!-- Login Section -->
  <div *ngIf="!isLoggedIn" class="row justify-content-center">
    <div class="col-md-4">
      <div class="card shadow">
        <div class="card-body">
          <h3 class="card-title text-center">Login</h3>
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" [(ngModel)]="email">
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" class="form-control" [(ngModel)]="password">
          </div>
          <button class="btn btn-primary w-100" (click)="login()">Ingresar</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Products Section -->
  <div *ngIf="isLoggedIn" class="row">
    <div class="col-md-8">
      <h3>Nuestros Productos</h3>
      <div class="row">
        <div class="col-md-4 mb-4" *ngFor="let p of products">
          <div class="card h-100 shadow-sm">
            <div class="card-body">
              <h5 class="card-title">{{ p.name }}</h5>
              <p class="card-text text-muted">{{ p.category }}</p>
              <p class="card-text"><strong>${{ p.price }}</strong></p>
              <button class="btn btn-success btn-sm w-100" (click)="addToCart(p)">Añadir al Carrito</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Cart Sidebar -->
    <div class="col-md-4">
      <div class="card shadow-sm">
        <div class="card-body">
          <h4>Carrito ({{ cart.length }})</h4>
          <ul class="list-group list-group-flush mb-3">
            <li class="list-group-item d-flex justify-content-between align-items-center" *ngFor="let item of cart">
              {{ item.name }}
              <span>${{ item.price }}</span>
            </li>
          </ul>
          <div *ngIf="cart.length > 0">
            <button class="btn btn-primary w-100" (click)="checkout()">Pagar Ahora</button>
          </div>
          <div *ngIf="cart.length === 0" class="text-center text-muted">
            El carrito está vacío
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
