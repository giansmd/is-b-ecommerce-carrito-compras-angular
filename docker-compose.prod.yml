services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: shopping_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      - postgres
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:password@postgres:5432/shopping_db
      SECRET_KEY: your-secret-key-here

  frontend-angular:
    build: ./frontend-angular
    restart: unless-stopped
    ports:
      - "4200:80"
    depends_on:
      - backend
    environment:
      BACKEND_URL: http://localhost:8000

  dashboard:
    build: ./dashboard
    restart: unless-stopped
    ports:
      - "8501:8501"
    depends_on:
      - backend
    environment:
      BACKEND_URL: http://backend:8000
      BACKEND_PUBLIC_URL: http://localhost:8000

volumes:
  postgres_data_prod:
